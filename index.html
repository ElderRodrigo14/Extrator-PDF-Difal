<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator DIFAL/FCP</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        input[type="file"] { display: block; margin-bottom: 20px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
        .log { margin-top: 10px; font-size: 14px; color: #555; white-space: pre-wrap; height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #fafafa; }
    </style>
    <!-- Bibliotecas para ler PDF e Excel no navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
</head>
<body>

<div class="container">
    <h1>📄 Extrator de DIFAL para Excel</h1>
    <p>Selecione as Notas Fiscais. O relatório será expandido lateralmente se houver mais de 18 notas.</p>

    <input type="file" id="pdfInput" multiple accept=".pdf">
    <button id="btnProcessar" onclick="processarArquivos()">Processar Notas</button>

    <div id="status"></div>
    <div id="log" class="log"></div>
</div>

<script>
    // Configura o leitor de PDF
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(" ");
            fullText += pageText + " ";
        }
        return fullText;
    }

    async function processarArquivos() {
        const fileInput = document.getElementById('pdfInput');
        const btn = document.getElementById('btnProcessar');
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        if (fileInput.files.length === 0) {
            alert("Por favor, selecione pelo menos um arquivo PDF.");
            return;
        }

        btn.disabled = true;
        status.innerText = "Lendo PDFs...";
        log.innerText = "Iniciando leitura dos arquivos...\n";
        let dadosExtraidos = [];

        // 1. Lê os dados de todos os PDFs
        for (const file of fileInput.files) {
            try {
                const text = await extractTextFromPDF(file);
                
                const matchNf = text.match(/N\.\s*([\d\.]+)/);
                const matchDifal = text.match(/DIFAL da UF Destino R\$\s*([\d\.,]+)/);
                const matchFcp = text.match(/FCP R\$\s*([\d\.,]+)/);

                let numeroNf = matchNf ? matchNf[1] : "N/A";
                let valorDifal = matchDifal ? parseFloat(matchDifal[1].replace('.', '').replace(',', '.')) : 0;
                let valorFcp = matchFcp ? parseFloat(matchFcp[1].replace('.', '').replace(',', '.')) : 0;

                const valorTotal = valorDifal + valorFcp;

                if (numeroNf !== "N/A") {
                    dadosExtraidos.push({ nf: numeroNf, valor: valorTotal });
                    log.innerText += `✅ NF ${numeroNf}: R$ ${valorTotal.toFixed(2)} extraído.\n`;
                } else {
                    log.innerText += `⚠️ Erro: Número não encontrado em ${file.name}.\n`;
                }
            } catch (error) {
                log.innerText += `❌ Erro ao ler o arquivo ${file.name}.\n`;
            }
        }

        if (dadosExtraidos.length === 0) {
            status.innerText = "Nenhum dado válido encontrado nas notas.";
            btn.disabled = false;
            return;
        }

        // 2. Baixa o modelo Excel do GitHub e edita
        status.innerText = "Preenchendo Excel...";
        try {
            const response = await fetch('./Extrator PDF DIFAL.xlsx'); 
            if (!response.ok) throw new Error("Planilha modelo não encontrada no repositório.");
            
            const arrayBuffer = await response.arrayBuffer();
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(arrayBuffer);
            const worksheet = workbook.worksheets[0]; 

            // Preenche a Data de Entrega
            const dataHoje = new Date().toLocaleDateString('pt-BR');
            for (let r = 1; r <= 15; r++) {
                for (let c = 1; c <= 5; c++) {
                    const celulaData = worksheet.getCell(r, c);
                    if (celulaData.value && celulaData.value.toString().includes("Data Entrega")) {
                        worksheet.getCell(r, c + 1).value = dataHoje;
                        worksheet.getCell(r, c + 1).font = { bold: true };
                        break;
                    }
                }
            }

            // Acha as colunas principais
            let colDescOrig = null, colValOrig = null, linhaHeader = null;
            for (let r = 1; r <= 20; r++) {
                for (let c = 1; c <= 10; c++) {
                    const celula = worksheet.getCell(r, c).value;
                    if (celula === "DESCRIÇÃO") { colDescOrig = c; linhaHeader = r; }
                    if (celula === "VALOR") { colValOrig = c; }
                }
            }

            if (!colDescOrig || !colValOrig) {
                status.innerText = "Erro: Cabeçalhos 'DESCRIÇÃO' e 'VALOR' não encontrados.";
                btn.disabled = false; return;
            }

            const MAX_LINHAS = 18;

            // Insere os dados fazendo a quebra de colunas
            for (let i = 0; i < dadosExtraidos.length; i++) {
                const dado = dadosExtraidos[i];
                const lote = Math.floor(i / MAX_LINHAS); 
                
                const colDescAtual = colDescOrig + (lote * 2);
                const colValAtual = colValOrig + (lote * 2);
                const linhaAtual = (linhaHeader + 1) + (i % MAX_LINHAS);

                // Desenha os cabeçalhos para as novas colunas clonadas
                if (lote > 0 && (i % MAX_LINHAS === 0)) {
                    const headerDesc = worksheet.getCell(linhaHeader, colDescAtual);
                    const headerVal = worksheet.getCell(linhaHeader, colValAtual);
                    
                    headerDesc.value = "DESCRIÇÃO";
                    headerVal.value = "VALOR";
                    
                    // Copia estilos do cabeçalho original e força o centro
                    headerDesc.style = Object.assign({}, worksheet.getCell(linhaHeader, colDescOrig).style);
                    headerVal.style = Object.assign({}, worksheet.getCell(linhaHeader, colValOrig).style);
                    headerDesc.alignment = { vertical: 'middle', horizontal: 'center' };
                    headerVal.alignment = { vertical: 'middle', horizontal: 'center' };

                    // Espelha a largura das colunas base
                    worksheet.getColumn(colDescAtual).width = worksheet.getColumn(colDescOrig).width || 20;
                    worksheet.getColumn(colValAtual).width = worksheet.getColumn(colValOrig).width || 15;
                }

                const cellDesc = worksheet.getCell(linhaAtual, colDescAtual);
                const cellVal = worksheet.getCell(linhaAtual, colValAtual);

                // Copia o visual da linha matriz (bordas, cor de fundo)
                const cellDescMatriz = worksheet.getCell(linhaAtual, colDescOrig);
                const cellValMatriz = worksheet.getCell(linhaAtual, colValOrig);
                cellDesc.style = Object.assign({}, cellDescMatriz.style);
                cellVal.style = Object.assign({}, cellValMatriz.style);

                // Escreve os dados
                cellDesc.value = `DIFAL NF ${dado.nf}`;
                cellVal.value = dado.valor;

                // Força alinhamento central em tudo e formatação da moeda R$
                cellDesc.alignment = { vertical: 'middle', horizontal: 'center' };
                cellVal.alignment = { vertical: 'middle', horizontal: 'center' };
                cellVal.numFmt = '"R$" #,##0.00';
            }

            // CORREÇÃO DO LIMITE DE PÁGINA (PRINT AREA)
            // Remove as limitações de margem do modelo base
            worksheet.pageSetup.printArea = undefined;
            // Força o Excel a "espremer" as colunas criadas na largura de 1 folha
            worksheet.pageSetup.fitToPage = true;
            worksheet.pageSetup.fitToWidth = 1;
            worksheet.pageSetup.fitToHeight = 1;

            // 3. Salva e baixa automático
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Protocolo_DIFAL_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.xlsx`;
            a.click();
            window.URL.revokeObjectURL(url);

            status.innerText = "✅ Relatório gerado com sucesso!";
        } catch (error) {
            status.innerText = `Erro ao gerar Excel: ${error.message}`;
            console.error(error);
        }
        
        btn.disabled = false;
    }
</script>

</body>
</html>
