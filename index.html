<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator DIFAL/FCP para PDF</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        input[type="file"] { display: block; margin-bottom: 20px; }
        button { background-color: #e53e3e; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #c53030; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
        .log { margin-top: 10px; font-size: 14px; color: #555; white-space: pre-wrap; height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #fafafa; }
    </style>
    <!-- Bibliotecas PDF.js (Leitura) e PDF-lib (Escrita) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>

<div class="container">
    <h1>📄 Extrator de DIFAL para PDF</h1>
    <p>Selecione as Notas Fiscais. O sistema preencherá o protocolo PDF automaticamente.</p>

    <input type="file" id="pdfInput" multiple accept=".pdf">
    <button id="btnProcessar" onclick="processarArquivos()">Gerar Protocolo PDF</button>

    <div id="status"></div>
    <div id="log" class="log"></div>
</div>

<script>
    // Configura o leitor de PDF
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // ==========================================
    // COORDENADAS RECALIBRADAS COM BASE NO PRINT
    // ==========================================
    const pos = {
        dataX: 160,             // Puxado para a esquerda para alinhar com o começo da linha
        dataY: 620,             // Subiu para ficar em cima da linha "Data Entrega:"
        
        primeiraLinhaY: 553,    // Subiu para alinhar perfeitamente com a primeira linha do "DIFAL"
        espacamentoLinhas: 18.4, // Reduzido para corrigir o "efeito cascata" que estava empurrando os textos para o rodapé
        
        colDescX: 185,          // Puxado para a esquerda para ficar logo após a palavra "DIFAL"
        colValorX: 380,         // Puxado bastante para a esquerda para ficar logo após o "R$"
        
        larguraNovaColuna: 0    
    };
    // ==========================================

    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(" ");
            fullText += pageText + " ";
        }
        return fullText;
    }

    async function processarArquivos() {
        const fileInput = document.getElementById('pdfInput');
        const btn = document.getElementById('btnProcessar');
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        if (fileInput.files.length === 0) {
            alert("Por favor, selecione pelo menos um arquivo PDF de Nota Fiscal.");
            return;
        }

        btn.disabled = true;
        status.innerText = "Lendo NFs...";
        log.innerText = "Iniciando leitura dos arquivos...\n";
        let dadosExtraidos = [];

        for (const file of fileInput.files) {
            try {
                const text = await extractTextFromPDF(file);
                
                const matchNf = text.match(/N\.\s*([\d\.]+)/);
                const matchDifal = text.match(/DIFAL da UF Destino R\$\s*([\d\.,]+)/);
                const matchFcp = text.match(/FCP R\$\s*([\d\.,]+)/);

                let numeroNf = matchNf ? matchNf[1] : "N/A";
                let valorDifal = matchDifal ? parseFloat(matchDifal[1].replace('.', '').replace(',', '.')) : 0;
                let valorFcp = matchFcp ? parseFloat(matchFcp[1].replace('.', '').replace(',', '.')) : 0;

                const valorTotal = valorDifal + valorFcp;

                if (numeroNf !== "N/A") {
                    dadosExtraidos.push({ nf: numeroNf, valor: valorTotal });
                    log.innerText += `✅ NF ${numeroNf}: R$ ${valorTotal.toFixed(2)} extraído.\n`;
                } else {
                    log.innerText += `⚠️ Erro: Número não encontrado em ${file.name}.\n`;
                }
            } catch (error) {
                log.innerText += `❌ Erro ao ler o arquivo ${file.name}.\n`;
            }
        }

        if (dadosExtraidos.length === 0) {
            status.innerText = "Nenhum dado válido encontrado nas notas.";
            btn.disabled = false;
            return;
        }

        status.innerText = "Preenchendo Protocolo PDF...";
        try {
            const response = await fetch('./modelo.pdf'); 
            if (!response.ok) throw new Error("O arquivo 'modelo.pdf' não foi encontrado no repositório.");
            
            const existingPdfBytes = await response.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];

            const fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
            const fontRegular = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

            const dataHoje = new Date().toLocaleDateString('pt-BR');
            firstPage.drawText(dataHoje, { 
                x: pos.dataX, 
                y: pos.dataY, 
                size: 11, 
                font: fontBold 
            });

            const MAX_LINHAS = 18;

            for (let i = 0; i < dadosExtraidos.length; i++) {
                if (i >= MAX_LINHAS) {
                    log.innerText += `\n⚠️ Limite de 18 notas atingido. NFs excedentes ignoradas nesta folha.`;
                    break;
                }

                const dado = dadosExtraidos[i];
                const linha = i;

                const xDescAtual = pos.colDescX;
                const xValAtual = pos.colValorX;
                const yAtual = pos.primeiraLinhaY - (linha * pos.espacamentoLinhas);

                firstPage.drawText(`NF ${dado.nf}`, { 
                    x: xDescAtual, 
                    y: yAtual, 
                    size: 9, 
                    font: fontBold 
                });

                const valorFormatado = dado.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                firstPage.drawText(valorFormatado, { 
                    x: xValAtual, 
                    y: yAtual, 
                    size: 9, 
                    font: fontRegular 
                });
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Protocolo_DIFAL_${dataHoje.replace(/\//g, '-')}.pdf`;
            a.click();
            window.URL.revokeObjectURL(url);

            status.innerText = "✅ Protocolo gerado com sucesso!";
        } catch (error) {
            status.innerText = `Erro ao gerar PDF: ${error.message}`;
            console.error(error);
        }
        
        btn.disabled = false;
    }
</script>

</body>
</html>
